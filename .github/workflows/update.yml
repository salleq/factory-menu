name: Update menu

on:
  schedule:
    - cron: "0 6 * * 1-5" # arkisin klo 6
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: node scrape.js

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add index.json
          git commit -m "update menu" || echo "no changes"
          git push
