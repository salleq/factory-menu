name: Update menu (github)

on:
  push:
    branches:
      - main
  schedule:
    - cron: "12 3-7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: node scrape.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # pakotetaan commit vaikka Git ei huomaisi muutosta
          git commit -m "update menu $(date +'%Y-%m-%d %H:%M:%S')" || echo "commit failed"

          git push --force
